apiVersion: apps/v1
kind: Deployment

metadata:
  name: ecommerce-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ecommerce

  template:
    metadata:
      labels:
        app: ecommerce

    spec:
      containers:
      - name: ecommerce-container
        image: ecommerce-project
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 3000

---
apiVersion: v1
kind: Service

metadata:
  name: ecommerce-service

spec:
  selector:
    app: ecommerce

  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
    nodePort: 30080

  type: NodePort