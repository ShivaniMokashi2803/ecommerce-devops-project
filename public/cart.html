<!DOCTYPE html>
<html>

<head>
    <title>Cart</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">
    🛒 Your Cart
</h1>

<div id="cartItems"
class="products">
</div>

<br>

<a href="index.html">
<button class="cart-btn">
Back To Shopping
</button>
</a>

<script>

let cart =
JSON.parse(localStorage
.getItem("cart")) || [];

let container =
document.getElementById(
"cartItems");

function showCart(){

container.innerHTML = "";

if(cart.length === 0){

container.innerHTML =
"<h2 style='color:white'>No Products Added</h2>";

return;
}

cart.forEach((item,index)=>{

container.innerHTML += `
<div class="card">

<h2>${item.name}</h2>

<p>${item.price}</p>

<button
onclick="deleteItem(${index})">
Delete
</button>

</div>
`;

});

}

function deleteItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

showCart();
}

showCart();

</script>

</body>
</html>
