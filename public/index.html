<!DOCTYPE html>
<html>

<head>
    <title>Shopping Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 class="title">
    🛒 My Shopping Store
</h1>

<div class="products">

    <div class="card">
        <h2>iPhone 15</h2>
        <p>₹80,000</p>
        <button onclick="addToCart('iPhone 15','₹80,000')">
            Add To Cart
        </button>
    </div>

    <div class="card">
        <h2>Laptop</h2>
        <p>₹55,000</p>
        <button onclick="addToCart('Laptop','₹55,000')">
            Add To Cart
        </button>
    </div>

    <div class="card">
        <h2>Headphones</h2>
        <p>₹2,500</p>
        <button onclick="addToCart('Headphones','₹2,500')">
            Add To Cart
        </button>
    </div>

    <div class="card">
        <h2>Smart Watch</h2>
        <p>₹5,000</p>
        <button onclick="addToCart('Smart Watch','₹5,000')">
            Add To Cart
        </button>
    </div>

    <div class="card">
        <h2>Shoes</h2>
        <p>₹3,000</p>
        <button onclick="addToCart('Shoes','₹3,000')">
            Add To Cart
        </button>
    </div>

    <div class="card">
        <h2>Bluetooth Speaker</h2>
        <p>₹4,500</p>
        <button onclick="addToCart('Bluetooth Speaker','₹4,500')">
            Add To Cart
        </button>
    </div>

</div>

<br>

<a href="cart.html">
<button class="cart-btn">
    Go To Cart 🛒
</button>
</a>

<script src="script.js"></script>

</body>
</html>
